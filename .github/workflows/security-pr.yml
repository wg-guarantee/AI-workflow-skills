name: security-pr

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/security-pr.yml"
      - ".semgrep/**"
      - ".gitleaks.toml"
      - "docs/security-monitoring.md"
      - "wefidevkits/**"
      - "flowchart-generator/**"
      - "skill-creating/**"
      - "mcp-builder/**"
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep
        id: semgrep_scan
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            returntocorp/semgrep:latest \
            scan \
            --config p/javascript \
            --config p/nodejs \
            --config p/python \
            --config .semgrep/wefidevkits.yml \
            --sarif \
            --output semgrep.sarif \
            --error \
            wefidevkits/scripts \
            flowchart-generator/src \
            skill-creating/scripts \
            mcp-builder/scripts

      - name: Summarize Semgrep Results
        if: always() && hashFiles('semgrep.sarif') != ''
        run: |
          echo "## Semgrep Scan Summary" >> $GITHUB_STEP_SUMMARY
          count=$(python3 -c "
          import json, sys
          try:
              with open('semgrep.sarif') as f:
                  data = json.load(f)
              total = sum(len(r.get('results', [])) for r in data.get('runs', []))
              print(total)
          except: print(0)
          ")
          if [ "$count" -gt 0 ]; then
            echo "**Found $count finding(s)**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('semgrep.sarif') as f:
              data = json.load(f)
          for run in data.get('runs', []):
              for r in run.get('results', []):
                  loc = r.get('locations', [{}])[0].get('physicalLocation', {})
                  msg = r.get('message', {}).get('text', '')
                  sev = r.get('level', 'WARNING')
                  file = loc.get('artifactLocation', {}).get('uri', '?')
                  line = loc.get('region', {}).get('startLine', '?')
                  print(f'[{sev}] {file}:{line} - {msg}')
          " >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "No findings. :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Semgrep SARIF Artifact
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif
          retention-days: 30

      - name: Enforce Semgrep Gate
        if: steps.semgrep_scan.outcome == 'failure'
        run: exit 1

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks_scan
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            dir /repo \
            --config /repo/.gitleaks.toml \
            --redact \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            --exit-code 1

      - name: Summarize Gitleaks Results
        if: always() && hashFiles('gitleaks.sarif') != ''
        run: |
          echo "## Gitleaks Scan Summary" >> $GITHUB_STEP_SUMMARY
          count=$(python3 -c "
          import json, sys
          try:
              with open('gitleaks.sarif') as f:
                  data = json.load(f)
              total = sum(len(r.get('results', [])) for r in data.get('runs', []))
              print(total)
          except: print(0)
          ")
          if [ "$count" -gt 0 ]; then
            echo "**Found $count finding(s)**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('gitleaks.sarif') as f:
              data = json.load(f)
          for run in data.get('runs', []):
              for r in run.get('results', []):
                  loc = r.get('locations', [{}])[0].get('physicalLocation', {})
                  msg = r.get('message', {}).get('text', '')
                  sev = r.get('level', 'WARNING')
                  file = loc.get('artifactLocation', {}).get('uri', '?')
                  line = loc.get('region', {}).get('startLine', '?')
                  print(f'[{sev}] {file}:{line} - {msg}')
          " >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "No findings. :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Gitleaks SARIF Artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 30

      - name: Enforce Gitleaks Gate
        if: steps.gitleaks_scan.outcome == 'failure'
        run: exit 1

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy
        id: trivy_scan
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            aquasec/trivy:latest \
            fs /repo \
            --scanners vuln,misconfig \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output /repo/trivy.sarif \
            --exit-code 1 \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/build \
            --skip-dirs /repo/wefidevkits/build \
            --skip-dirs /repo/superpowers \
            --skip-dirs /repo/frontend-design/reference \
            --skip-dirs /repo/legacy-system-archaeology/assets \
            --skip-dirs /repo/legacy-system-archaeology/references \
            --skip-dirs /repo/doc2md \
            --skip-dirs /repo/documentation-writer \
            --skip-dirs /repo/impeccable

      - name: Summarize Trivy Results
        if: always() && hashFiles('trivy.sarif') != ''
        run: |
          echo "## Trivy Scan Summary" >> $GITHUB_STEP_SUMMARY
          count=$(python3 -c "
          import json, sys
          try:
              with open('trivy.sarif') as f:
                  data = json.load(f)
              total = sum(len(r.get('results', [])) for r in data.get('runs', []))
              print(total)
          except: print(0)
          ")
          if [ "$count" -gt 0 ]; then
            echo "**Found $count finding(s)**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('trivy.sarif') as f:
              data = json.load(f)
          for run in data.get('runs', []):
              for r in run.get('results', []):
                  loc = r.get('locations', [{}])[0].get('physicalLocation', {})
                  msg = r.get('message', {}).get('text', '')
                  sev = r.get('level', 'WARNING')
                  file = loc.get('artifactLocation', {}).get('uri', '?')
                  line = loc.get('region', {}).get('startLine', '?')
                  print(f'[{sev}] {file}:{line} - {msg}')
          " >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "No findings. :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Trivy SARIF Artifact
        if: always() && hashFiles('trivy.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.sarif
          retention-days: 30

      - name: Enforce Trivy Gate
        if: steps.trivy_scan.outcome == 'failure'
        run: exit 1
