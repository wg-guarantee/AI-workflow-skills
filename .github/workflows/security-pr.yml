name: security-pr

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/security-pr.yml"
      - ".semgrep/**"
      - ".gitleaks.toml"
      - "docs/security-monitoring.md"
      - "wefidevkits/**"
      - "flowchart-generator/**"
      - "skill-creating/**"
      - "mcp-builder/**"
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep
        id: semgrep_scan
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            returntocorp/semgrep:latest \
            scan \
            --config p/javascript \
            --config p/nodejs \
            --config p/python \
            --config .semgrep/wefidevkits.yml \
            --sarif \
            --output semgrep.sarif \
            --error \
            wefidevkits/scripts \
            flowchart-generator/src \
            skill-creating/scripts \
            mcp-builder/scripts

      - name: Ensure Semgrep SARIF exists
        if: always() && steps.semgrep_scan.outcome != 'success'
        run: |
          if [ ! -f semgrep.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > semgrep.sarif
          fi

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Enforce Semgrep Gate
        if: steps.semgrep_scan.outcome == 'failure'
        run: exit 1

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks_scan
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            dir /repo \
            --config /repo/.gitleaks.toml \
            --redact \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            --exit-code 1

      - name: Ensure Gitleaks SARIF exists
        if: always() && steps.gitleaks_scan.outcome != 'success'
        run: |
          if [ ! -f gitleaks.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > gitleaks.sarif
          fi

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Enforce Gitleaks Gate
        if: steps.gitleaks_scan.outcome == 'failure'
        run: exit 1

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy
        id: trivy_scan
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            aquasec/trivy:latest \
            fs /repo \
            --scanners vuln,misconfig \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output /repo/trivy.sarif \
            --exit-code 1 \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/build \
            --skip-dirs /repo/wefidevkits/build \
            --skip-dirs /repo/superpowers \
            --skip-dirs /repo/frontend-design/reference \
            --skip-dirs /repo/legacy-system-archaeology/assets \
            --skip-dirs /repo/legacy-system-archaeology/references \
            --skip-dirs /repo/doc2md \
            --skip-dirs /repo/documentation-writer \
            --skip-dirs /repo/impeccable

      - name: Ensure Trivy SARIF exists
        if: always() && steps.trivy_scan.outcome != 'success'
        run: |
          if [ ! -f trivy.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > trivy.sarif
          fi

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy

      - name: Enforce Trivy Gate
        if: steps.trivy_scan.outcome == 'failure'
        run: exit 1
